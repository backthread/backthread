# Release — on a `v*` tag: test → verify version lockstep → publish `backthread` to
# npm via OIDC TRUSTED PUBLISHING → cut a GitHub Release with auto-generated notes.
# Keeps the npm package + the CC-plugin/extension manifests in lockstep on each release.
#
# SETUP (founder, one-time, NO TOKEN): on npmjs.com → backthread → Settings →
# Trusted Publisher, add a GitHub Actions publisher:
#   Organization or user: backthread   Repository: backthread
#   Workflow filename:    release.yml   Environment name: release
#   Allowed actions:      Allow npm publish
# Trusted publishing exchanges THIS workflow's short-lived OIDC token for an npm
# credential at publish time — no NPM_TOKEN secret, no 2FA OTP, nothing to rotate.
#
# To cut a release:
#   1. bump cli/package.json version AND the 3 manifests it's lockstep-checked against
#      (cli/.claude-plugin/plugin.json, extensions/gemini/gemini-extension.json,
#       extensions/codex/plugins/backthread/plugin.json) + rebuild the bundle
#      (`npm run bundle -w backthread`), commit, merge.
#   2. `git tag v<version> && git push origin v<version>`  (tag MUST match the version).
name: Release

on:
  push:
    tags: ['v*']

# id-token: write → the OIDC token that trusted publishing + provenance need.
# contents: write → create the GitHub Release.
permissions:
  contents: write
  id-token: write

# Serialize releases so two tags pushed close together can't race the npm publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # MUST equal the "Environment name" set on the npm Trusted Publisher. GitHub
    # auto-creates this environment on first use; add protection rules (e.g. required
    # reviewers) to it later if you want a manual approval gate before each publish.
    environment: release
    steps:
      # SHA-pinned (not floating tags) — see ci.yml + .github/dependabot.yml (ARP-797).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x. Pinned to
      # 11.18.0 (the last 11.x) instead of @latest: npm 12.0.0 regressed
      # `npm publish --provenance` with "Cannot find module 'sigstore'" (its bundled
      # libnpmpublish can't resolve sigstore). 0.11.0 published cleanly on 11.18.0.
      # Revisit the pin once a fixed 12.x ships.
      - name: Upgrade npm (OIDC trusted publishing needs >= 11.5.1)
        run: npm install -g npm@11.18.0
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Committed bundle is in sync with src
        run: git diff --exit-code cli/dist-bundle/backthread.js
      # Guard: the tag must match cli/package.json (and the manifests, via the lockstep
      # tests above) — never publish a version that doesn't match the tag.
      - name: Tag matches cli/package.json version
        run: |
          PKG="v$(node -p "require('./cli/package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != cli/package.json ($PKG). Bump cli/package.json + the plugin/extension manifests to match the tag." >&2
            exit 1
          fi
      # `npm publish` runs the cli's `prepack` (build + bundle), so the published bin is
      # always a fresh self-contained bundle. With OIDC trusted publishing npm
      # authenticates via the workflow's id-token (no NODE_AUTH_TOKEN) and auto-attaches
      # build provenance.
      - name: Publish backthread to npm (OIDC trusted publishing)
        run: npm publish -w backthread --provenance --access public
      - name: GitHub Release (auto-generated notes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
