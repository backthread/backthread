# CI — typecheck + test the `backthread` CLI on every PR + push to main, verify the
# committed self-contained bundle is in sync with src (ARP-478), and hold the supply-chain
# floor for a widely-`npx`'d package: a vulnerability gate, a lockfile-integrity gate, and
# a guard that the release keeps npm provenance on (ARP-797).
#
# GitHub Actions are PINNED BY COMMIT SHA (not a floating tag) so a compromised/retagged
# action can't silently run in CI; Dependabot (.github/dependabot.yml) proposes bumps.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      # Lockfile integrity: it must be present, and `npm ci` (below) hard-fails if it's out
      # of sync with package.json — so an un-committed dependency change can't slip through.
      - name: Lockfile present
        run: test -f package-lock.json || { echo "::error::package-lock.json is missing — commit it (npm install)."; exit 1; }
      - name: Install (npm ci — fails on a drifted lockfile)
        run: npm ci
      # Vulnerability gate: fail the build on a HIGH+ advisory anywhere in the tree. The
      # published `npx backthread` bundle INLINES the one runtime dep (@modelcontextprotocol/sdk)
      # via esbuild, so a vuln in a "devDependency" can still ship — we audit the FULL tree,
      # not just prod. Keep the tree clean; if a future dev-only advisory genuinely can't ship
      # and can't be fixed, add a reviewed exception here (don't silently lower the level).
      - name: Vulnerability gate (npm audit, high+)
        run: npm audit --audit-level=high
      - name: Typecheck
        run: npm run typecheck
      # `npm test` runs the cli test suite + `npm run build` + `npm run bundle` (smoke),
      # so it ALSO enforces the version-lockstep guards (plugin.json / gemini-extension.json
      # / codex plugin.json all == cli/package.json) and regenerates dist-bundle/backthread.js.
      - name: Test
        run: npm test
      # The Claude Code marketplace plugin is cloned from git with NO build step on
      # install, so the COMMITTED bundle must equal a fresh build (ARP-477). `npm test`
      # just rebuilt it; fail if it differs from what's committed (esbuild is
      # deterministic for the lockfile-pinned version).
      - name: Committed bundle is in sync with src
        run: git diff --exit-code cli/dist-bundle/backthread.js
      # Regression guard: every release workflow must keep npm build provenance on, so each
      # published package always carries a verifiable, tamper-evident build attestation.
      - name: Releases keep npm provenance on
        # Anchor to the `npm publish … --provenance` line (not just any occurrence), so a
        # flag left behind in a comment can't mask a publish step that dropped it. Globs
        # every release workflow (release.yml = the CLI, release-extractor.yml = the
        # extractor lib, and any future release-*.yml) so a new publish path can't escape
        # the guard by simply not being listed here.
        run: |
          for wf in .github/workflows/release*.yml; do
            grep -Eq 'npm publish[^#]*--provenance' "$wf" \
              || { echo "::error::$wf's npm publish must keep --provenance"; exit 1; }
          done
